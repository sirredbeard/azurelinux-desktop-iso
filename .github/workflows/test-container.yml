name: Test hybrid AZL+Fedora container

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: "Hybrid image to test"
        required: true
        type: string
        default: "ghcr.io/sirredbeard/azurelinux-desktop/hybrid:latest"
  workflow_call:
    inputs:
      image_ref:
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull hybrid container
        run: podman pull "${{ inputs.image_ref }}"

      - name: Run package and Flatpak canary
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-container-logs"
          podman run --rm \
            --user root \
            -v "$GITHUB_WORKSPACE/scripts/test-hybrid-container.sh:/usr/local/bin/test-hybrid-container:ro,Z" \
            -v "$GITHUB_WORKSPACE/test-container-logs:/logs:Z" \
            "${{ inputs.image_ref }}" \
            /usr/local/bin/test-hybrid-container

      - name: Upload canary logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-container-canary-logs
          path: test-container-logs
          retention-days: 7
          if-no-files-found: warn
