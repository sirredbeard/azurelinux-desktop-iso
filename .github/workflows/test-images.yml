name: Test Azure Linux Desktop images

# Manual-only for the first cut, same as the build/release workflows here.
# The slow part of this suite is the headless QEMU boot under pure TCG
# software emulation - GitHub-hosted runners do not expose nested KVM - so I
# want this as an explicit, opt-in validation pass before deciding whether it
# earns a permanent workflow_run fan-out off the image builders.
#
# The container-repos job (fast repo-priority check via podman, no VM
# build) always runs on dispatch. The rest of the pipeline - building the
# test qcow2, the headless boot smoke test, and the post-boot guest checks
# - only runs when the full_pipeline input is checked, since that leg is
# the multi-hour, TCG-only path. Local dogfooding of the actual QEMU
# scripts (qemu-test-live-iso.sh, qemu-test-disk-image.sh, etc.) against
# real downloaded release artifacts happens on dev hardware with KVM
# instead, so this workflow doesn't need to duplicate that by default.
#
# The qcow2 built here is intentionally a test-only variant, not the release
# artifact itself: same shared kickstart, same disk-image plumbing, one extra
# oneshot systemd service baked in so the guest can run its own upgrade/repo/
# flatpak checks and print PASS/FAIL markers back over the serial console.

on:
  workflow_dispatch:
    inputs:
      full_pipeline:
        description: >-
          Also build+boot the test qcow2 and run guest checks (slow, TCG
          only, 3-4+ hours). Leave unchecked to run just the fast
          container repo-priority check.
        type: boolean
        default: false

jobs:
  container-repos:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install podman
        run: sudo apt-get update && sudo apt-get install -y podman

      - name: Run fast container repo-origin check
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-work/container"
          set -o pipefail
          AZL_PODMAN_WORKDIR="$GITHUB_WORKSPACE/test-work/container" \
            ./scripts/test-container-repos.sh \
            2>&1 | tee "$GITHUB_WORKSPACE/test-work/container/test-container-repos.log"

      - name: Upload container test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azurelinux-desktop-test-container-logs
          path: test-work/container
          retention-days: 7
          if-no-files-found: warn

  build-test-qcow2:
    needs: container-repos
    if: ${{ inputs.full_pipeline }}
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
          tool-cache: false

      - name: Show disk space
        run: df -h /

      - name: Pull Fedora 43 build image
        run: docker pull fedora:43

      - name: Render test kickstart variant
        run: ./scripts/render-test-kickstart.sh kickstart/azurelinux-desktop-live.ks kickstart/azurelinux-desktop-live-test.ks

      - name: Build test qcow2 (lorax + livemedia-creator --make-disk)
        run: |
          sudo modprobe xfs
          docker run --rm \
            --privileged \
            -v /dev:/dev \
            --security-opt label=disable \
            -v "$GITHUB_WORKSPACE:/workspace" \
            --tmpfs /tmp:exec,size=8g \
            fedora:43 \
            bash -exo pipefail -c '
              mount --make-rprivate /

              dnf5 install -y \
                lorax lorax-templates-generic lorax-lmc-novirt \
                anaconda-core anaconda-install-env-deps \
                qemu-img systemd-udev \
                shim-x64 grub2-efi-x64-cdboot policycoreutils

              python3 /workspace/scripts/patch-anaconda-efi-skip-bug.py

              /usr/lib/systemd/systemd-udevd --daemon
              udevadm trigger
              udevadm settle

              livemedia-creator \
                --make-disk \
                --no-virt \
                --resultdir /workspace/test-live-disk-result \
                --image-name azurelinux-desktop-live-test.img \
                --ks /workspace/kickstart/azurelinux-desktop-live-test.ks \
                --project "Azure Linux Desktop" \
                --releasever 44 \
                --logfile /workspace/livemedia-test-disk-build.log

              qemu-img convert -O qcow2 -c \
                /workspace/test-live-disk-result/azurelinux-desktop-live-test.img \
                /workspace/test-live-disk-result/azurelinux-desktop-live-test.qcow2
              qemu-img resize /workspace/test-live-disk-result/azurelinux-desktop-live-test.qcow2 64G
              rm -f /workspace/test-live-disk-result/azurelinux-desktop-live-test.img
            '

      - name: Fix log ownership for artifact upload
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE/anaconda" "$GITHUB_WORKSPACE/test-live-disk-result" 2>/dev/null || true

      - name: Show result directory
        if: always()
        run: |
          ls -lah "$GITHUB_WORKSPACE/test-live-disk-result" || true
          ls -lah "$GITHUB_WORKSPACE/anaconda" || true

      - name: Upload test qcow2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: azurelinux-desktop-live-test-qcow2
          path: test-live-disk-result/azurelinux-desktop-live-test.qcow2
          compression-level: 0
          retention-days: 7
          if-no-files-found: error

      - name: Upload test-image build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azurelinux-desktop-live-test-build-logs
          path: |
            livemedia-test-disk-build.log
            kickstart/azurelinux-desktop-live-test.ks
            test-live-disk-result/*.log
            anaconda/*
          retention-days: 7
          if-no-files-found: warn

  boot-smoke:
    needs: build-test-qcow2
    if: ${{ inputs.full_pipeline }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install QEMU and OVMF
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils ovmf

      - name: Download test qcow2
        uses: actions/download-artifact@v4
        with:
          name: azurelinux-desktop-live-test-qcow2
          path: dist

      - name: Run headless boot smoke test
        run: |
          # No nested KVM on GitHub-hosted runners: this is pure TCG, so let
          # it take the time it needs. A healthy GNOME boot can still take
          # 10-15+ minutes here.
          mkdir -p "$GITHUB_WORKSPACE/test-work/boot-smoke"
          set -o pipefail
          AZL_QEMU_WORKDIR="$GITHUB_WORKSPACE/test-work/boot-smoke" \
            ./scripts/test-boot-smoke.sh dist/azurelinux-desktop-live-test.qcow2 1200 \
            2>&1 | tee "$GITHUB_WORKSPACE/test-work/boot-smoke/test-boot-smoke.log"

      - name: Upload boot-smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azurelinux-desktop-test-boot-smoke-logs
          path: test-work/boot-smoke
          retention-days: 7
          if-no-files-found: warn

  guest-checks:
    needs: [build-test-qcow2, boot-smoke]
    if: ${{ inputs.full_pipeline }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install QEMU and OVMF
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils ovmf

      - name: Download test qcow2
        uses: actions/download-artifact@v4
        with:
          name: azurelinux-desktop-live-test-qcow2
          path: dist

      - name: Run post-boot guest checks
        run: |
          # Same TCG warning as the smoke test, plus time for a full `dnf
          # upgrade` and a real flatpak install inside the guest.
          mkdir -p "$GITHUB_WORKSPACE/test-work/guest-checks"
          set -o pipefail
          AZL_QEMU_WORKDIR="$GITHUB_WORKSPACE/test-work/guest-checks" \
            ./scripts/test-post-boot-checks.sh dist/azurelinux-desktop-live-test.qcow2 2400 \
            2>&1 | tee "$GITHUB_WORKSPACE/test-work/guest-checks/test-post-boot-checks.log"

      - name: Upload guest-check logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azurelinux-desktop-test-guest-check-logs
          path: test-work/guest-checks
          retention-days: 7
          if-no-files-found: warn
