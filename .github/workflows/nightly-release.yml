name: Nightly Azure Linux Desktop Release

# The project intentionally keeps no release/archive history. Each nightly
# build replaces the preceding live ISO, disk-image formats, and installer
# ISO with artifacts built from the current default branch. The hybrid
# publication replaces its latest and UTC-date tags from the same revision.
on:
  schedule:
    - cron: "30 05 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

concurrency:
  group: azurelinux-desktop-publication
  cancel-in-progress: false

jobs:
  remove-previous-publication:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out all tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete previous GitHub releases and tags
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release list --repo "${{ github.repository }}" --limit 1000 \
            --json tagName --jq '.[].tagName' |
            while IFS= read -r tag; do
              [ -n "$tag" ] || continue
              gh release delete "$tag" --repo "${{ github.repository }}" --yes
            done

          git ls-remote --tags --refs origin |
            awk '{sub("refs/tags/", "", $2); print $2}' |
            while IFS= read -r tag; do
              [ -n "$tag" ] || continue
              git push origin --delete "refs/tags/$tag"
            done

  publish-live-images:
    needs: remove-previous-publication
    uses: ./.github/workflows/release-live-iso.yml
    with:
      build_iso: true
      build_qcow2: true
      build_vhdx: true
      build_vdi: true
      build_vmdk: true

  publish-installer:
    needs: remove-previous-publication
    uses: ./.github/workflows/release-installer-iso.yml

  publish-hybrid-container:
    needs: remove-previous-publication
    uses: ./.github/workflows/build-container.yml
