name: Release Azure Linux Desktop live ISO/Images

# Manual-only. Calls build-live-iso.yml as a reusable workflow (so the
# actual lorax/livemedia-creator build logic lives in exactly one place,
# and the full, unsplit ISO still gets uploaded there as a normal Actions
# artifact for anyone testing off a given run), then publishes the ISO as
# a GitHub Release tagged with the UTC date the release job runs,
# YYYY.MM.DD - one tag per day is enough for a project that gets rebuilt
# a handful of times a week, and a plain date sorts and reads better than
# a bumped semver nobody is tracking here.
#
# GitHub Releases hard-caps a single asset at 2GiB
# (https://docs.github.com/en/repositories/releasing-projects-on-github/about-releases),
# and this ISO is ~3.05GiB, comfortably over that. Rather than fight it
# with extra compression (the squashfs inside is already compressed, so
# a second pass barely moves the needle and just burns CI minutes), the
# release step splits the ISO into fixed-size parts with the plain `split`
# command and uploads the parts plus a sha256 manifest. Same treatment
# for the qcow2/VHDX/VDI/VMDK disk images build-live-iso.yml also
# produces - splitting keeps every asset's download/verify story
# identical regardless of kind. See the "How do I use this" section of
# README.md for the reassembly steps (PowerShell and a one-line Linux/
# macOS `cat` equivalent).
#
# qcow2 is squashed the same way the ISO is (already internally
# compressed, via qemu-img's own -c/zstd) - a second compression pass
# wouldn't move the needle there either. VHDX/VDI/VMDK are different:
# none of those three container formats support any compression at the
# qemu-img level (confirmed straight from `qemu-img convert --help`:
# -c/--compress is qcow/qcow2-only), so build-vhdx/build-vdi/build-vmdk
# each 7z-compress their own conversion output before uploading it -
# this is a real size win for those three specifically, not a redundant
# pass, and is why release-vhdx/release-vdi/release-vmdk below look for
# a *.7z file rather than the raw disk image. See findings/gh-actions-
# live-iso-build.md for the qemu-img flag research this is based on.
#
# Disk-image status: the base qcow2 and VHDX conversion are now confirmed
# working - genuine UEFI boot in QEMU, root filesystem correctly grows to
# fill the disk, VHDX carries the same 64G size - verified against two
# consecutive real CI builds (see findings/gh-actions-live-iso-build.md).
# VDI (VirtualBox) and VMDK (VMware) are new this session and only
# verified locally with `qemu-img info` (correct 64G virtual size, right
# format/subformat) - neither has been through a real CI build yet, and
# this dev environment deliberately doesn't have VirtualBox/VMware
# installed to boot-test them (see findings/gh-actions-live-iso-build.md).
# All four disk-image jobs still carry job-level continue-on-error, so a
# regression in any one of them never blocks the ISO (which build-iso
# itself doesn't depend on any of this) - each asset's own download/
# split/upload steps below are continue-on-error too, and the finalize
# job says plainly which of the five assets actually made it into a
# given release instead of leaving that to be discovered by a missing
# download link.
#
# Each asset (ISO, qcow2, VHDX, VDI, VMDK) gets its own download/split/
# upload job instead of one job doing all five in sequence. create-
# release makes the (initially file-less) release first so there's
# never a race between jobs over who creates it, then the five asset
# jobs run concurrently against that same tag - each only touches its
# own multi-gigabyte file, so one slow or failing asset no longer holds
# up the others. finalize runs last and edits the release body once
# every asset job has reported in.
#
# workflow_dispatch inputs mirror build-live-iso.yml's own build_iso/
# build_vhdx/build_vdi/build_vmdk toggles, so a single format can be
# rebuilt and re-released without redoing the other four - e.g. fixing
# just the VMDK conversion no longer means waiting through another ISO
# build, another anaconda run for no reason, and re-uploading VHDX/VDI/
# qcow2 assets that didn't change. build_qcow2 controls both whether the
# qcow2 disk image itself gets (re-)published as its own release asset
# AND, alongside build_vhdx/build_vdi/build_vmdk, whether build-live-
# iso.yml needs to produce the intermediate qcow2 at all - VHDX/VDI/VMDK
# are just qemu-img conversions of that qcow2, so any one of them
# implies rebuilding it even on a run that doesn't want the qcow2 asset
# itself re-released (see the build job's computed build_disk_image
# input below). ISO is fully independent of all of this - it doesn't
# touch the disk-image build at all.

on:
  workflow_dispatch:
    inputs:
      build_iso:
        description: "Build and release the live ISO"
        type: boolean
        default: true
      build_qcow2:
        description: "Build and release the qcow2 disk image (also implied if VHDX/VDI/VMDK are requested, since they convert from it - but this flag controls whether the qcow2 itself gets re-released)"
        type: boolean
        default: true
      build_vhdx:
        description: "Build and release the VHDX disk image (Hyper-V)"
        type: boolean
        default: true
      build_vdi:
        description: "Build and release the VDI disk image (VirtualBox)"
        type: boolean
        default: true
      build_vmdk:
        description: "Build and release the VMDK disk image (VMware)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  create-release:
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Compute release tag
        id: tag
        run: echo "tag=$(date -u +%Y.%m.%d)" >> "$GITHUB_OUTPUT"

      - name: Create (or reuse) the release, no assets yet
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Azure Linux Desktop ${{ steps.tag.outputs.tag }}
          body_path: .github/release-notes-template.md

  build-iso:
    uses: ./.github/workflows/build-live-iso.yml
    with:
      build_iso: ${{ inputs.build_iso }}
      build_disk_image: false
      build_vhdx: false
      build_vdi: false
      build_vmdk: false

  build-disk-images:
    uses: ./.github/workflows/build-live-iso.yml
    with:
      build_iso: false
      # Any of VHDX/VDI/VMDK needing a fresh conversion means the qcow2
      # intermediate has to be rebuilt too, even when its own asset is
      # not requested.
      build_disk_image: ${{ inputs.build_qcow2 || inputs.build_vhdx || inputs.build_vdi || inputs.build_vmdk }}
      build_vhdx: ${{ inputs.build_vhdx }}
      build_vdi: ${{ inputs.build_vdi }}
      build_vmdk: ${{ inputs.build_vmdk }}

  release-iso:
    needs: [create-release, build-iso]
    if: ${{ inputs.build_iso }}
    runs-on: ubuntu-24.04
    # Same resilience reasoning as qcow2/vhdx/vdi/vmdk below - the ISO
    # build has its own generous 180-min timeout and rarely needs this in
    # practice, but there's no reason a slow/failed ISO build should be
    # able to fail the whole run and block whichever disk images did
    # come out fine from getting uploaded too.
    continue-on-error: true
    steps:
      - name: Download built ISO
        uses: actions/download-artifact@v4
        with:
          name: azurelinux-desktop-live-iso
          path: dist

      - name: Split, checksum, and upload
        working-directory: dist
        run: |
          # 1900M keeps every part comfortably under GitHub's 2GiB
          # (2147483648 byte) per-asset cap, base64/multipart overhead
          # included.
          f=$(ls ./*.iso)
          sha256sum "$f" > "$f.sha256"
          split -b 1900M -d -a 2 --additional-suffix=.part "$f" "$f.split."
          rm -f "$f"
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            "$f".split.*.part "$f.sha256" --clobber \
            -R "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ github.token }}

  release-qcow2:
    needs: [create-release, build-disk-images]
    if: ${{ inputs.build_qcow2 }}
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - name: Download qcow2 disk image
        uses: actions/download-artifact@v4
        with:
          name: azurelinux-desktop-live-qcow2
          path: dist

      - name: Split, checksum, and upload
        working-directory: dist
        run: |
          f=$(ls ./*.qcow2)
          sha256sum "$f" > "$f.sha256"
          split -b 1900M -d -a 2 --additional-suffix=.part "$f" "$f.split."
          rm -f "$f"
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            "$f".split.*.part "$f.sha256" --clobber \
            -R "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ github.token }}

  release-vhdx:
    needs: [create-release, build-disk-images]
    if: ${{ inputs.build_vhdx }}
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - name: Download VHDX disk image
        uses: actions/download-artifact@v4
        with:
          name: azurelinux-desktop-live-vhdx
          path: dist

      - name: Split, checksum, and upload
        working-directory: dist
        run: |
          # Already a .7z from build-vhdx's own compression step - split/
          # checksum/upload that directly, no re-compression here.
          f=$(ls ./*.vhdx.7z)
          sha256sum "$f" > "$f.sha256"
          split -b 1900M -d -a 2 --additional-suffix=.part "$f" "$f.split."
          rm -f "$f"
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            "$f".split.*.part "$f.sha256" --clobber \
            -R "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ github.token }}

  release-vdi:
    needs: [create-release, build-disk-images]
    if: ${{ inputs.build_vdi }}
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - name: Download VDI disk image
        uses: actions/download-artifact@v4
        with:
          name: azurelinux-desktop-live-vdi
          path: dist

      - name: Split, checksum, and upload
        working-directory: dist
        run: |
          # Already a .7z from build-vdi's own compression step.
          f=$(ls ./*.vdi.7z)
          sha256sum "$f" > "$f.sha256"
          split -b 1900M -d -a 2 --additional-suffix=.part "$f" "$f.split."
          rm -f "$f"
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            "$f".split.*.part "$f.sha256" --clobber \
            -R "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ github.token }}

  release-vmdk:
    needs: [create-release, build-disk-images]
    if: ${{ inputs.build_vmdk }}
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - name: Download VMDK disk image
        uses: actions/download-artifact@v4
        with:
          name: azurelinux-desktop-live-vmdk
          path: dist

      - name: Split, checksum, and upload
        working-directory: dist
        run: |
          # Already a .7z from build-vmdk's own compression step.
          f=$(ls ./*.vmdk.7z)
          sha256sum "$f" > "$f.sha256"
          split -b 1900M -d -a 2 --additional-suffix=.part "$f" "$f.split."
          rm -f "$f"
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            "$f".split.*.part "$f.sha256" --clobber \
            -R "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ github.token }}

  finalize:
    needs: [create-release, release-iso, release-qcow2, release-vhdx, release-vdi, release-vmdk]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Note which disk images made it into this release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # qcow2/VHDX are confirmed working (real UEFI boot, correct 64G
          # size on both) - see findings/gh-actions-live-iso-build.md.
          # VDI/VMDK are newer and only locally verified (qemu-img info:
          # correct size/format), not yet proven against a real CI build
          # or a real VirtualBox/VMware boot. Every disk-image job is
          # continue-on-error, so any of them can legitimately be missing
          # from a given release - check the release's actual assets
          # (not job results, since continue-on-error jobs can still show
          # as failed) and say plainly which formats made it, instead of
          # leaving that to be discovered by a missing download link.
          # This checks the release's assets as they stand now, not just
          # what this particular run touched - a run that only asked for
          # build_vmdk, say, correctly leaves qcow2/VHDX/VDI alone rather
          # than re-uploading them, so "missing" here means missing from
          # the release overall, which is still worth flagging regardless
          # of which formats this specific run was asked to (re)build.
          tag="${{ needs.create-release.outputs.tag }}"
          assets=$(gh release view "$tag" -R "${{ github.repository }}" --json assets --jq '.assets[].name')
          # qcow2 assets are still named *.qcow2.split.*; vhdx/vdi/vmdk
          # are now *.<kind>.7z.split.* since build-vhdx/vdi/vmdk each
          # 7z-compress their own output before this job ever sees it.
          missing=""
          for kind in qcow2 vhdx vdi vmdk; do
            if ! echo "$assets" | grep -q "\.$kind\(\.7z\)\?\.split\."; then
              missing="$missing $kind"
            fi
          done
          # Strip any note this same step added on a previous run before
          # deciding whether to add a fresh one - blindly prepending
          # every time this job runs (which can be many times a day
          # across independent per-format re-dispatches) stacked
          # duplicate notes exactly the way generate_release_notes used
          # to stack "Full Changelog" text. create-release resetting the
          # body to the static template on every run happens to clear
          # this too today, but stripping it here directly means this
          # job is idempotent on its own, without depending on that.
          body=$(gh release view "$tag" -R "${{ github.repository }}" --json body --jq '.body')
          clean_body=$(printf '%s' "$body" | grep -v '^\*\*Note:\*\* the following disk-image format(s) did not make it into this release:')
          if [ -n "$missing" ]; then
            note="**Note:** the following disk-image format(s) did not make it into this release:$missing. See [findings/gh-actions-live-iso-build.md](https://github.com/${{ github.repository }}/blob/main/findings/gh-actions-live-iso-build.md) for current status."
            printf '%s\n\n%s\n' "$note" "$clean_body" | gh release edit "$tag" -R "${{ github.repository }}" --notes-file -
          elif [ "$clean_body" != "$body" ]; then
            # Nothing missing anymore, but a stale note from an earlier
            # run was found and stripped - write the cleaned body back
            # so the note doesn't linger after the format that was
            # missing gets fixed.
            printf '%s\n' "$clean_body" | gh release edit "$tag" -R "${{ github.repository }}" --notes-file -
          fi
