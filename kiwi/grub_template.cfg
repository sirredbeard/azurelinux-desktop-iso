set default=0
set timeout=${boot_timeout}

# Switch GRUB to graphical mode so it inherits the EFI GOP framebuffer and
# clears the BdsDxe firmware text before handing off to the kernel. This also
# sets gfxpayload=keep so Plymouth gets a pre-negotiated DRM framebuffer and
# does not need to re-initialize the display driver itself.
insmod efi_gop
insmod efi_uga
insmod all_video
set gfxmode=auto
set gfxpayload=keep
terminal_output gfxterm
clear

# Keep serial as an input path for interactive rescue menus; do NOT add it to
# terminal_output or GRUB reverts to text mode and loses the GOP framebuffer.
serial --speed=115200 --unit=0 --word=8 --parity=no --stop=1
terminal_input serial console

menuentry "Install Azure Linux Desktop" --class os {
    search ${search_params}
    linux ($$root)/${bootpath}/${kernel_file} ${boot_options} azl.autoinstall inst.nosave=all_ks
    initrd ($$root)/${bootpath}/${initrd_file}
}

menuentry "Try Azure Linux Desktop (Live)" --class os {
    search ${search_params}
    linux ($$root)/${bootpath}/${kernel_file} ${boot_options} inst.nosave=all_ks
    initrd ($$root)/${bootpath}/${initrd_file}
}
